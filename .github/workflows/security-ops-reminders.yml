name: Security Ops Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 1 */3 *"

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const title = `Quarterly security ops: rotate secrets, restore drill, pentest review`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });
            if (issues.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "- [ ] Rotate production and staging secrets",
                "- [ ] Run `deploy/ops/restore-drill.sh` against a fresh backup",
                "- [ ] Review independent pentest status and retest open findings",
                "- [ ] Verify nginx rate limits and `/api/docs/` `/api/schema/` blocks",
                "",
                "Runbook: `docs/security/production-ops.md`",
              ].join("\n"),
            });
