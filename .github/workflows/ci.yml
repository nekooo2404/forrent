name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rental_db
          POSTGRES_USER: rental_user
          POSTGRES_PASSWORD: rental_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rental_user -d rental_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://rental_user:rental_password@127.0.0.1:5432/rental_db
      REDIS_URL: redis://127.0.0.1:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: ci-secret-key-at-least-32-bytes-long
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      CELERY_TASK_ALWAYS_EAGER: "True"
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v6
      - run: python scripts/check-mojibake.py
        working-directory: .
        timeout-minutes: 1
      - run: python scripts/check-secrets.py
        working-directory: .
        timeout-minutes: 1
      - run: python scripts/check-browser-auth-storage.py
        working-directory: .
        timeout-minutes: 1
      - run: |
          python scripts/check-ui-ux-field-evidence.py --self-test
          python scripts/check-ui-ux-field-evidence.py --check-docs
          python scripts/check-ui-ux-field-evidence.py docs/releases/ui-ux-field-evidence-template.md
          python scripts/prepare-ui-ux-release-evidence.py --self-test
          python scripts/diagnose-production-hero.py --self-test
          python scripts/prepare-room-photo-review.py --self-test
        working-directory: .
        timeout-minutes: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
        timeout-minutes: 3
      - run: pip install -r requirements.txt pip-audit
        timeout-minutes: 5
      - run: python manage.py check --settings=config.settings.local
        timeout-minutes: 3
      - run: python manage.py check --settings=config.settings.production
        timeout-minutes: 3
      - run: python manage.py makemigrations --check --dry-run
        timeout-minutes: 3
      - run: pytest apps/accounts apps/blogs apps/common apps/contacts apps/commissions apps/locations apps/rooms apps/viewing_requests
        timeout-minutes: 8
      - run: pip-audit -r requirements.txt --strict --timeout 30 --progress-spinner off
        timeout-minutes: 5

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        app: [frontend-client, frontend-admin]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
        timeout-minutes: 5
      - run: npm audit --audit-level=high
        timeout-minutes: 5
      - run: npm run lint
        timeout-minutes: 5
      - run: npm run build
        timeout-minutes: 10

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend-client/package-lock.json
            frontend-admin/package-lock.json
            e2e/package-lock.json
      - run: npm ci
        working-directory: frontend-client
        timeout-minutes: 5
      - run: npm ci
        working-directory: frontend-admin
        timeout-minutes: 5
      - run: npm ci
        working-directory: e2e
        timeout-minutes: 3
      - run: npx playwright install --with-deps chromium firefox webkit
        working-directory: e2e
        timeout-minutes: 12
      - run: npm run test:ci
        working-directory: e2e
        timeout-minutes: 10
      - run: npm run test:cross-browser
        working-directory: e2e
        timeout-minutes: 12
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
