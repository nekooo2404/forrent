name: Production Uptime

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check public sites
        run: |
          curl --fail --silent --show-error --location --retry 3 --max-time 20 https://forrent.io.vn/homepage > /dev/null
          curl --fail --silent --show-error --location --retry 3 --max-time 20 https://admin.forrent.io.vn/log-in > /dev/null
          curl --fail --silent --show-error --location --retry 3 --max-time 20 https://api.forrent.io.vn/api/health/ \
            | python -c "import json, sys; assert json.load(sys.stdin).get('status') == 'ok'"
