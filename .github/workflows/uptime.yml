name: Production Uptime

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check public sites
        timeout-minutes: 3
        run: |
          CURL_ARGS=(--fail --silent --show-error --location --retry 3 --retry-delay 5 --retry-all-errors --connect-timeout 10 --max-time 30)

          echo "Checking client: https://forrent.io.vn/"
          curl "${CURL_ARGS[@]}" https://forrent.io.vn/ > /dev/null

          echo "Checking admin: https://admin.forrent.io.vn/log-in"
          curl "${CURL_ARGS[@]}" https://admin.forrent.io.vn/log-in > /dev/null

          echo "Checking API: https://api.forrent.io.vn/api/health/"
          curl "${CURL_ARGS[@]}" https://api.forrent.io.vn/api/health/ \
            | python -c "import json, sys; data=json.load(sys.stdin); checks=data.get('checks', {}); assert data.get('status') == 'ok' and all(checks.get(key) is True for key in ('database', 'cache', 'media_storage'))"
