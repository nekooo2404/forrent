name: DAST

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target URL to scan
        required: false
        default: https://forrent.io.vn

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v6
      - name: Check target availability
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 "$TARGET" > /dev/null
      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        timeout-minutes: 10
        with:
          target: ${{ env.TARGET }}
          fail_action: true
          cmd_options: "-a -T 6"
