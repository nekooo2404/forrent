services:
  backend:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_DJANGO_STARTUP_TASKS: "1"
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis_cache:6379/0}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=8)"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  frontend_client:
    build:
      context: ../frontend-client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
        NEXT_PUBLIC_SITE_URL: https://forrent.io.vn
        NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
      NEXT_PUBLIC_SITE_URL: https://forrent.io.vn
      NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
      CONTACT_PHONE: ${CONTACT_PHONE:-0914032706}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-support@forrent.io.vn}
      LEGAL_NAME: ${LEGAL_NAME:-ForRent}
      LEGAL_ADDRESS: ${LEGAL_ADDRESS:-Khu Sakura, Vinhomes Smart City, Hà Nội}
      BUSINESS_REGISTRATION: ${BUSINESS_REGISTRATION:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  frontend_admin:
    build:
      context: ../frontend-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
        NEXT_PUBLIC_CLIENT_URL: https://forrent.io.vn
        NEXT_PUBLIC_SENTRY_DSN: ${ADMIN_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
      NEXT_PUBLIC_CLIENT_URL: https://forrent.io.vn
      NEXT_PUBLIC_SENTRY_DSN: ${ADMIN_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=INFO --queues=critical,notifications,maintenance,default --hostname=worker@%h
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_DJANGO_STARTUP_TASKS: "0"
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis_cache:6379/0}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect --timeout 5 --destination worker@$$(hostname) ping | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build: .
    command: celery -A config beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule --pidfile=/tmp/celerybeat.pid
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_DJANGO_STARTUP_TASKS: "0"
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis_cache:6379/0}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
      - --maxmemory
      - ${REDIS_DURABLE_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis_cache:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
  redis_data:
