services:
  backend:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend_client:
    build:
      context: ../frontend-client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
        NEXT_PUBLIC_SITE_URL: https://forrent.io.vn
        NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
      NEXT_PUBLIC_SITE_URL: https://forrent.io.vn
      NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  frontend_admin:
    build:
      context: ../frontend-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
        NEXT_PUBLIC_CLIENT_URL: https://forrent.io.vn
        NEXT_PUBLIC_SENTRY_DSN: ${ADMIN_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: https://api.forrent.io.vn
      NEXT_PUBLIC_CLIENT_URL: https://forrent.io.vn
      NEXT_PUBLIC_SENTRY_DSN: ${ADMIN_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A config worker -l info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celery_beat:
    build: .
    command: celery -A config beat -l info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
