version: 2.1

jobs:
  backend:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project/backend
    environment:
      DATABASE_URL: sqlite:///ci.sqlite3
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECRET_KEY: ci-secret-key-at-least-32-bytes-long
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "requirements.txt" }}
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt pip-audit
      - save_cache:
          key: pip-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip
      - run: python manage.py check --settings=config.settings.local
      - run: pytest apps/accounts apps/blogs apps/contacts apps/commissions apps/rooms apps/viewing_requests
      - run: pip-audit --strict

  frontend:
    parameters:
      app:
        type: string
    docker:
      - image: cimg/node:22.13
    working_directory: ~/project/<< parameters.app >>
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - npm-v1-<< parameters.app >>-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          key: npm-v1-<< parameters.app >>-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build

workflows:
  ci:
    jobs:
      - backend
      - frontend:
          name: frontend-client
          app: frontend-client
      - frontend:
          name: frontend-admin
          app: frontend-admin
